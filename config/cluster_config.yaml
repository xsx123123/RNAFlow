# RNAFlow Pipeline - Cluster Resource Configuration
#
# This file defines standardized resource profiles for different computational tasks
# in the RNA-seq analysis pipeline. These profiles are used when running Snakemake
# with cluster execution (e.g., --executor slurm, --executor pbs).
#
# Each resource profile specifies:
# - threads: Number of CPU cores to allocate
# - mem_mb: Memory allocation in megabytes
# - runtime: Maximum job runtime in minutes
# - queue_type: Target queue/partition for job submission
#
# Resource Profile Guidelines:
# - low_resource: Basic QC tasks, lightweight processing (FastQC, MultiQC, etc.)
# - medium_resource: Moderate computational tasks (alignment post-processing, variant calling)
# - high_resource: Heavy computational tasks (STAR alignment, RSEM quantification, assembly)
# - very_high_resource: Extremely resource-intensive tasks (large genome indexing, complex analyses)
#
# Note: Adjust memory and thread values based on your cluster's available resources
# and typical job requirements for your specific use cases.

cluster_config:
  resource_profiles:
    low_resource:
      threads: 2
      mem_mb: 18000
      runtime: 60  # minutes
      queue_type: "default_queue"

    medium_resource:
      threads: 10
      mem_mb: 86000
      runtime: 120  # minutes
      queue_type: "default_queue"

    high_resource:
      threads: 18
      mem_mb: 100000
      runtime: 240  # minutes
      queue_type: "high_mem_queue"

    very_high_resource:
      threads: 32
      mem_mb: 64000
      runtime: 360
      queue_type: "high_mem_queue"
version: '3.8'

services:
  # RNAFlow 主服务
  rnaflow:
    build:
      context: .
      dockerfile: Dockerfile
    image: rnaflow:0.1.9
    container_name: rnaflow-pipeline
    volumes:
      # 挂载数据目录（修改为你的实际路径）
      - /data:/data
      # 挂载配置文件
      - ./config.yaml:/pipeline/config.yaml:ro
      # 挂载参考基因组（可选）
      - /data/jzhang/reference:/reference:ro
    working_dir: /pipeline
    command: >
      --cores=60
      --config analysisyaml=/pipeline/config.yaml
      --use-conda
      --conda-frontend mamba
    environment:
      - RNAFLOW_HOME=/pipeline
      - SNAKEMAKE_CONDA_PREFIX=/opt/conda/envs
    # 资源限制（根据实际环境调整）
    deploy:
      resources:
        limits:
          cpus: '60'
          memory: 200G
        reservations:
          cpus: '4'
          memory: 8G
    # 如需保持容器运行进行调试，取消下面注释
    # stdin_open: true
    # tty: true

  # RNAFlow 开发模式（带shell访问）
  rnaflow-dev:
    build:
      context: .
      dockerfile: Dockerfile
    image: rnaflow:0.1.9
    container_name: rnaflow-dev
    volumes:
      - /data:/data
      - .:/pipeline
      - /data/jzhang/reference:/reference:ro
    working_dir: /pipeline
    command: /bin/bash
    stdin_open: true
    tty: true
    profiles:
      - dev  # 使用: docker-compose --profile dev up -d

  # RNAFlow QC专用服务（轻量级）
  rnaflow-qc:
    build:
      context: ./docker
      dockerfile: Dockerfile.qc
    image: rnaflow-qc:0.1.9
    container_name: rnaflow-qc
    volumes:
      - /data:/data
    working_dir: /data
    command: >
      --cores=8
      --config analysisyaml=/data/project/config.yaml
      --only-qc
    profiles:
      - qc

# 共享网络（如需多容器协作）
networks:
  default:
    name: rnaflow-network

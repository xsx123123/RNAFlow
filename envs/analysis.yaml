name: analysis
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # ===== 核心基础设施 =====
  - python=3.12
  - pip
  - mamba
  
  # ===== QC & 预处理 =====
  - fastqc=0.12.1
  - fastp=0.23.4
  - multiqc=1.25.1
  - fastq-screen=0.15.3
  
  # ===== 比对 & 定量 =====
  - star=2.7.11b
  - rsem=1.3.3
  - samtools=1.21
  - sambamba=1.0.0
  
  # ===== 变异检测 =====
  - gatk4=4.6.0.0
  - bcftools=1.21
  - snpeff=5.2
  - picard=3.3.0
  - bwa-mem2=2.2.1
  
  # ===== 组装 & 注释 =====
  - stringtie=2.2.3
  - gffcompare=0.12.6
  
  # ===== 差异表达 & 富集 =====
  - r-base=4.4
  - bioconductor-deseq2=1.46.0
  - bioconductor-edger=4.2.0
  - r-tidyverse=2.0.0
  
  # ===== 可变剪接 =====
  - rmats=4.3.0
  - circexplorer2=2.3.8
  
  # ===== 融合基因 =====
  - arriba=2.4.0
  
  # ===== QC评估工具 =====
  - qualimap=2.3
  - rseqc=5.0.3
  - preseq=3.2.0
  - mosdepth=0.3.10
  - deeptools=3.5.6
  
  # ===== 实用工具 =====
  - pigz=2.8
  - htslib=1.21
  - bedtools=2.31.1
  - ucsc-bedgraphtobigwig=377
  - ucsc-bigwigaverageoverbed=377
  
  # ===== Python包 =====
  - numpy
  - pandas
  - pyyaml
  - openpyxl

# RNAFlow MCP 服务器路径配置
# 如果你的 conda 或 snakemake 不在系统环境变量中，请在此指定绝对路径

# Conda 的二进制文件路径 (例如: /home/user/miniconda3/bin/conda)
conda_path: "/home/zj/miniconda3/bin/conda"

# Snakemake 的二进制文件路径 (例如: /home/user/miniconda3/envs/rnaflow/bin/snakemake)
snakemake_path: "/home/zj/miniconda3/envs/snakemake/bin/snakemake"

# 默认激活的 conda 环境名称
default_env: "snakemake"

# ========== 远程服务配置 ==========
# 监听地址 (0.0.0.0 表示允许所有 IP 访问)
host: "0.0.0.0"
# 监听端口
port: 8000

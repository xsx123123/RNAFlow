# RNAFlow Path Configuration
# This file helps AI agents locate the RNAFlow installation

# RNAFlow root directory (contains snakefile)
RNAFLOW_ROOT: "/home/zj/pipeline/RNAFlow"

# Conda environment configuration
CONDA:
  # Recommended conda environment name for RNAFlow
  DEFAULT_ENV_NAME: "rnaflow"
  # Whether to auto-activate environment (if false, user will be prompted)
  AUTO_ACTIVATE: false
  # Path to conda (auto-detected if empty)
  CONDA_PATH: ""

# Default config template paths
CONFIG_TEMPLATES:
  complete: "/home/zj/pipeline/RNAFlow/skills/examples/config_complete.yaml"
  standard_deg: "/home/zj/pipeline/RNAFlow/skills/examples/config_standard_deg.yaml"
  qc_only: "/home/zj/pipeline/RNAFlow/skills/examples/config_qc_only.yaml"

# Snakemake default parameters
SNAKEMAKE_DEFAULTS:
  cores: 60
  use_conda: true
  conda_frontend: mamba

# Example usage:
# cd $RNAFLOW_ROOT
# snakemake --cores 60 --use-conda --config analysisyaml=/path/to/project_config.yaml
